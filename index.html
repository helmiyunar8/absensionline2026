<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Online</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

input,select,button{
width:90%;
padding:12px;
margin:10px;
font-size:16px;
}

video{
width:90%;
max-width:400px;
}

canvas{
display:none;
}
</style>

</head>

<body>

<h2>ABSENSI ONLINE</h2>

<input type="text" id="nama" placeholder="Nama">

<input type="text" id="kelas" placeholder="Kelas">

<select id="status">
<option value="Hadir">Hadir</option>
<option value="Sakit">Sakit</option>
<option value="Izin">Izin</option>
<option value="Alpha">Alpha</option>
</select>

<br>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="ambilFoto()">📸 Ambil Foto</button>

<button onclick="kirim()">Kirim Absensi</button>

<canvas id="canvas"></canvas>

<script>

var video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:true})
.then(function(stream){
video.srcObject = stream;
})
.catch(function(err){
alert("Kamera tidak bisa dibuka");
});

function ambilFoto(){

var canvas = document.getElementById("canvas");
var context = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 300;

context.drawImage(video,0,0,400,300);

alert("Foto berhasil diambil");
}

function kirim(){

var nama = document.getElementById("nama").value;
var kelas = document.getElementById("kelas").value;
var status = document.getElementById("status").value;

if(nama=="" || kelas==""){
alert("Nama dan kelas harus diisi");
return;
}

var canvas = document.getElementById("canvas");
var foto = canvas.toDataURL("image/jpeg",0.7);

var data = new FormData();

data.append("nama",nama);
data.append("kelas",kelas);
data.append("status",status);
data.append("foto",foto);

fetch("https://script.google.com/macros/s/AKfycbwqqHvukcSZrrXYSiZF6lGkP5CThkrFC845hdrdIyz_t1YnbiU7QzDq-BglfSjpkKH6Tg/exec",{
method:"POST",
body:data
})
.then(response => response.text())
.then(data => {
alert("Absensi berhasil dikirim");
})
.catch(error => {
alert("Gagal mengirim absensi");
});

}

</script>

</body>
</html>
