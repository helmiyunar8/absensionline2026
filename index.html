<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Absensi Online</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h2{
color:#333;
}

input,select,button{
width:90%;
padding:12px;
margin:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2c7be5;
color:white;
border:none;
}

video{
width:90%;
max-width:400px;
border-radius:10px;
margin-top:10px;
}

canvas{
display:none;
}
</style>

</head>

<body>

<h2>ABSENSI SISWA</h2>

<input type="text" id="nama" placeholder="Nama Siswa">

<input type="text" id="kelas" placeholder="Kelas">

<select id="status">
<option value="Hadir">Hadir</option>
<option value="Sakit">Sakit</option>
<option value="Izin">Izin</option>
<option value="Alpha">Alpha</option>
</select>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="ambilFoto()">📷 Ambil Foto</button>

<button onclick="kirim()">Kirim Absensi</button>

<canvas id="canvas"></canvas>

<script>

var video = document.getElementById("video");

// membuka kamera
navigator.mediaDevices.getUserMedia({video:true})
.then(function(stream){
video.srcObject = stream;
})
.catch(function(){
alert("Kamera tidak bisa dibuka");
});

function ambilFoto(){

var canvas = document.getElementById("canvas");
var context = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 300;

context.drawImage(video,0,0,400,300);

alert("Foto berhasil diambil");

}

function kirim(){

var nama = document.getElementById("nama").value;
var kelas = document.getElementById("kelas").value;
var status = document.getElementById("status").value;

if(nama=="" || kelas==""){
alert("Nama dan kelas harus diisi");
return;
}

var canvas = document.getElementById("canvas");
var foto = canvas.toDataURL("image/png");

var data = new FormData();

data.append("nama",nama);
data.append("kelas",kelas);
data.append("status",status);
data.append("foto",foto);

// GANTI LINK DI BAWAH DENGAN LINK APPS SCRIPT BAPAK
fetch("https://script.google.com/macros/s/AKfycbzxHyCPH4BoXhQiXwaurMbLJau3VhfDMKfF5C-Yztd0-DHd8OjZ7LJJsFucYl8WJBVA6Q/exec",{
method:"POST",
mode:"no-cors",
body:data
})
.then(function(){
alert("Absensi berhasil dikirim");
})
.catch(function(){
alert("Gagal mengirim absensi");
});
}

</script>

</body>
</html>
